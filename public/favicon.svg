<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Blue medical cross: vertical arm -->
  <rect x="15" y="2" width="18" height="44" rx="4" fill="#0047AB"/>
  <!-- Blue medical cross: horizontal arm -->
  <rect x="2" y="15" width="44" height="18" rx="4" fill="#0047AB"/>
  <!-- White circular badge (mirrors the circular Q emblem in the brand logo) -->
  <circle cx="24" cy="24" r="11" fill="white"/>
  <!-- Brand-red Q lettermark -->
  <text x="24.5" y="31" font-family="'Arial Black', 'Arial Bold', Arial, sans-serif" font-size="15" font-weight="900" fill="#E4002B" text-anchor="middle">Q</text>
</svg>
